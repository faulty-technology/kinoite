---
name: Build container image
on:
  pull_request:
    branches:
      - main
  schedule:
    - cron: "05 10 * * *" # 10:05am UTC everyday
  push:
    branches:
      - main
    paths-ignore:
      - "**/README.md"
  workflow_dispatch:

env:
  IMAGE_DESC: "Faulty Technology Fedora Kinoite bootc image"
  IMAGE_NAME: "${{ github.event.repository.name }}" # output image name, usually same as repo name
  IMAGE_REGISTRY: "ghcr.io/${{ github.repository_owner }}" # do not edit
  DEFAULT_TAG: "latest"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref || github.run_id }}
  cancel-in-progress: true

jobs:
  build_push:
    name: Build and push image
    runs-on: ubuntu-24.04

    permissions:
      contents: write
      packages: write
      id-token: write
      security-events: write

    steps:
      - name: Prepare environment
        run: |
          # Lowercase the image uri
          echo "IMAGE_REGISTRY=${IMAGE_REGISTRY,,}" >> ${GITHUB_ENV}
          echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      # These stage versions are pinned by https://github.com/renovatebot/renovate
      - name: Checkout
        uses: actions/checkout@v6

      # This is optional, but if you see that your builds are way too big for the runners, you can enable this by uncommenting the following lines:
      - name: Maximize build space
        uses: ublue-os/remove-unwanted-software@v9

      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +%Y\-%m\-%d\T%H\:%M\:%S\Z)" >> $GITHUB_OUTPUT

      - name: Image Metadata
        uses: docker/metadata-action@v5
        id: metadata
        with:
          # Default tags are "$DEFAULT_TAG" and "$DEFAULT_TAG.$date".
          tags: |
            type=raw,value=${{ env.DEFAULT_TAG }}
            type=raw,value=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDD'}}
            type=raw,value={{date 'YYYYMMDD'}}
            type=sha,enable=${{ github.event_name == 'pull_request' }}
            type=ref,event=pr
          labels: |
            org.opencontainers.image.created=${{ steps.date.outputs.date }}
            org.opencontainers.image.description=${{ env.IMAGE_DESC }}
            org.opencontainers.image.documentation=https://raw.githubusercontent.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/${{ github.sha }}/README.md
            org.opencontainers.image.source=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/blob/${{ github.sha }}/Containerfile
            org.opencontainers.image.title=${{ env.IMAGE_NAME }}
            org.opencontainers.image.url=https://github.com/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}/tree/${{ github.sha }}
            org.opencontainers.image.vendor=${{ github.repository_owner }}
            org.opencontainers.image.version=${{ env.DEFAULT_TAG }}.{{date 'YYYYMMDDHHmmss'}}
            containers.bootc=1
          sep-tags: " "
          sep-annotations: " "

      - name: Build Image
        id: build_image
        uses: redhat-actions/buildah-build@v2
        with:
          containerfiles: |
            ./Containerfile
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
          oci: false

      - name: Generate additive SBOM
        run: |
          buildah unshare bash -c '
            CONTAINER=$(buildah from localhost/${{ env.IMAGE_NAME }}:latest)
            MOUNT=$(buildah mount $CONTAINER)
            cp "$MOUNT/usr/share/kinoite/additive-sbom.tsv" additive-packages.tsv
            buildah unmount $CONTAINER
            buildah rm $CONTAINER
          '
          python3 -c "
          import json, urllib.parse
          packages = []
          for line in open('additive-packages.tsv'):
              name, version, lic = line.strip().split('\t')
              purl = f'pkg:rpm/fedora/{urllib.parse.quote(name, safe=\"\")}@{urllib.parse.quote(version, safe=\"\")}'
              packages.append({
                  'SPDXID': f'SPDXRef-{name}',
                  'name': name,
                  'versionInfo': version,
                  'downloadLocation': 'NOASSERTION',
                  'filesAnalyzed': False,
                  'licenseDeclared': lic,
                  'externalRefs': [{
                      'referenceCategory': 'PACKAGE-MANAGER',
                      'referenceType': 'purl',
                      'referenceLocator': purl
                  }]
              })
          root = {
              'SPDXID': 'SPDXRef-image',
              'name': '${{ env.IMAGE_NAME }}',
              'versionInfo': '${{ github.sha }}',
              'downloadLocation': 'https://github.com/${{ github.repository }}',
              'filesAnalyzed': False
          }
          doc = {
              'spdxVersion': 'SPDX-2.3',
              'dataLicense': 'CC0-1.0',
              'SPDXID': 'SPDXRef-DOCUMENT',
              'name': '${{ env.IMAGE_NAME }}-additive',
              'documentNamespace': 'https://github.com/${{ github.repository }}/sbom/${{ github.sha }}',
              'packages': [root] + packages,
              'relationships': [
                  {'spdxElementId': 'SPDXRef-DOCUMENT', 'relatedSpdxElement': 'SPDXRef-image', 'relationshipType': 'DESCRIBES'}
              ] + [
                  {'spdxElementId': 'SPDXRef-image', 'relatedSpdxElement': f'SPDXRef-{p[\"name\"]}', 'relationshipType': 'DEPENDS_ON'}
                  for p in packages
              ]
          }
          json.dump(doc, open('sbom-additive.spdx.json', 'w'), indent=2)
          "

      - name: Upload additive SBOM
        uses: actions/upload-artifact@v4
        with:
          name: sbom-additive
          path: sbom-additive.spdx.json
          retention-days: 30

      - name: Submit dependencies to dependency graph
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          python3 -c "
          import json, urllib.parse, datetime
          resolved = {}
          for line in open('additive-packages.tsv'):
              name, version, lic = line.strip().split('\t')
              purl = f'pkg:rpm/fedora/{urllib.parse.quote(name, safe=\"\")}@{urllib.parse.quote(version, safe=\"\")}'
              resolved[name] = {
                  'package_url': purl,
                  'relationship': 'direct',
                  'scope': 'runtime'
              }
          snapshot = {
              'version': 0,
              'sha': '${{ github.sha }}',
              'ref': 'refs/heads/${{ github.event.repository.default_branch }}',
              'scanned': datetime.datetime.utcnow().strftime('%Y-%m-%dT%H:%M:%SZ'),
              'job': {
                  'correlator': 'additive-packages',
                  'id': '${{ github.run_id }}'
              },
              'detector': {
                  'name': 'kinoite-additive-sbom',
                  'version': '1.0.0',
                  'url': 'https://github.com/${{ github.repository }}'
              },
              'manifests': {
                  'additive-packages': {
                      'name': 'additive-packages',
                      'file': {'source_location': 'build_files/build.sh'},
                      'resolved': resolved
                  }
              }
          }
          json.dump(snapshot, open('dependency-snapshot.json', 'w'), indent=2)
          "
          gh api --method POST /repos/${{ github.repository }}/dependency-graph/snapshots \
            --input dependency-snapshot.json

      - name: Scan additive SBOM with Grype
        uses: anchore/scan-action@v7
        id: scan
        with:
          sbom: sbom-additive.spdx.json
          fail-build: false
          output-format: sarif

      - name: Log Grype scan summary
        run: |
          echo "::group::Packages scanned"
          python3 -c "
          import json
          sbom = json.load(open('sbom-additive.spdx.json'))
          pkgs = [p for p in sbom['packages'] if p['SPDXID'] != 'SPDXRef-image']
          for p in pkgs:
              print(f\"  {p['name']} {p['versionInfo']}\")
          print(f\"\nTotal: {len(pkgs)} packages\")
          "
          echo "::endgroup::"
          echo "::group::Grype results"
          python3 -c "
          import json
          sarif = json.load(open('${{ steps.scan.outputs.sarif }}'))
          results = sarif.get('runs', [{}])[0].get('results', [])
          if results:
              for r in results:
                  print(f\"  {r['ruleId']}: {r['message']['text'][:120]}\")
              print(f\"\nTotal: {len(results)} vulnerabilities\")
          else:
              print('  No vulnerabilities found')
          "
          echo "::endgroup::"

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ steps.scan.outputs.sarif }}
          category: grype-additive

      # These `if` statements are so that pull requests for your custom images do not make it publish any packages under your name without you knowing
      # They also check if the runner is on the default branch so that things like the merge queue (if you enable it), are going to work
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v4
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Push To GHCR
        uses: redhat-actions/push-to-registry@v2
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        id: push
        env:
          REGISTRY_USER: ${{ github.actor }}
          REGISTRY_PASSWORD: ${{ github.token }}
        with:
          registry: ${{ env.IMAGE_REGISTRY }}
          image: ${{ env.IMAGE_NAME }}
          tags: ${{ steps.metadata.outputs.tags }}
          username: ${{ env.REGISTRY_USER }}
          password: ${{ env.REGISTRY_PASSWORD }}

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.0.0
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        with:
          cosign-release: "v2.6.1"

      - name: Sign container image
        if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)
        run: |
          IMAGE_FULL="${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_NAME }}"
          cosign sign -y --key env://COSIGN_PRIVATE_KEY "${IMAGE_FULL}@${{ steps.push.outputs.digest }}"
        env:
          COSIGN_EXPERIMENTAL: false
          COSIGN_PRIVATE_KEY: ${{ secrets.SIGNING_SECRET }}

  cleanup:
    name: Clean up old image versions
    runs-on: ubuntu-24.04
    needs: build_push
    if: github.event_name != 'pull_request' && github.ref == format('refs/heads/{0}', github.event.repository.default_branch)

    permissions:
      packages: write

    steps:
      - name: Prepare environment
        run: echo "IMAGE_NAME=${IMAGE_NAME,,}" >> ${GITHUB_ENV}

      - name: Delete old tagged versions
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.IMAGE_NAME }}
          package-type: container
          min-versions-to-keep: 30
          ignore-versions: "^latest$"

      - name: Delete untagged versions (orphaned signatures and layers)
        uses: actions/delete-package-versions@v5
        with:
          package-name: ${{ env.IMAGE_NAME }}
          package-type: container
          min-versions-to-keep: 0
          delete-only-untagged-versions: true
